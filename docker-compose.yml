version: '3.8'

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: hkpl_pgvector
    environment:
      POSTGRES_USER: hkpl_user
      POSTGRES_PASSWORD: ${DB_PASSWORD}   # from .env
      POSTGRES_DB: hkpl_vector_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hkpl_user -d hkpl_vector_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: '2'

volumes:
  pgdata:
    name: hkpl_pgvector_data